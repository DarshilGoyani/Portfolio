<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Registration Form</title>

  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .form-wrapper {
        background-color: #fff;
        width: 90%;
        max-width: 500px;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .form-wrapper h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
    }

    form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #444;
    }

    form input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 2px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    form input:focus {
        border-color: #0d6efd;
        outline: none;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #0d6efd;
        color: white;
        font-size: 16px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    .submit-btn:hover {
        background-color: #094bbf;
    }

    label.error {
        color: red;
        font-size: 13px;
        margin-top: -15px;
        margin-bottom: 15px;
        display: block;
    }
  </style>
</head>
<body>

<div class="form-wrapper">
    <h2>Register Account</h2>
    <form id="registrationform" novalidate>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@gmail.com">

        <label for="phone">Phone Number</label>
        <input type="text" id="phone" name="phone" placeholder="1234567890">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password">

        <button type="submit" class="submit-btn">Register</button>
    </form>
</div>

<script>
    
</script>

</body>
</html>
